pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,jsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    format:
      glob: "*.{js,jsx,css,json}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    build:
      run: npm run build
    test:
      run: npm test

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
