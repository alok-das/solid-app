pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,jsx}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true
    format:
      glob: "*.{js,jsx,css,json}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    build:
      run: npm run build
    coverage:
      run: npx vitest run --coverage --coverage.include=src/** --coverage.all --coverage.thresholds.lines=80 --coverage.thresholds.functions=80 --coverage.thresholds.branches=80 --coverage.thresholds.statements=80
    test:
      run: npm test
    verify:
      run: mkdir -p .git && touch .git/.hooks-verified

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

# post-commit is NOT bypassed by --no-verify
post-commit:
  commands:
    guard:
      run: |
        if [ ! -f .git/.hooks-verified ]; then
          echo ""
          echo "❌  --no-verify is not allowed in this project."
          echo "    Your commit has been rolled back."
          echo "    Please fix the issues and commit again."
          echo ""
          git reset --soft HEAD~1
          exit 1
        fi
        rm -f .git/.hooks-verified
